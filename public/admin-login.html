<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login | Radiant Aura Photography</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f7f4f2;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }

    .login-card {
      background: white;
      padding: 2rem;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      width: 100%;
      max-width: 400px;
    }

    .login-card h1 {
      margin-top: 0;
      margin-bottom: 1rem;
      text-align: center;
    }

    .login-card .form-group {
      margin-bottom: 1rem;
    }

    .login-card label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 600;
    }

    .login-card input {
      width: 100%;
      padding: 0.85rem;
      border: 1px solid #ccc;
      border-radius: 10px;
      box-sizing: border-box;
    }

    .login-card button {
      width: 100%;
      padding: 0.9rem;
      border: none;
      border-radius: 10px;
      background: black;
      color: white;
      font-size: 1rem;
      cursor: pointer;
    }

    .login-status {
      margin-top: 1rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <h1>Admin Login</h1>

    <form id="adminLoginForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required />
      </div>

      <button type="submit">Log In</button>
    </form>

    <p id="loginStatus" class="login-status"></p>
  </div>

  <script src="/js/admin-login.js"></script>
</body>
</html>
